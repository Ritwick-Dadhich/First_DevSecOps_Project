name: DevSecOps Secure SDLC Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  sast_scan:
    name: Run SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install and Run Semgrep
        run: |
          pip install semgrep
          semgrep scan --config=auto
