name: DevSecOps Secure SDLC Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  sast_scan:
    name: Run SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install and Run Semgrep
        run: |
          pip install semgrep
          semgrep scan --config=auto --json -o semgrep-sast-report.json || true

      - name: Upload SAST Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sast-report
          path: semgrep-sast-report.json

  sca_scan:
    name: Run SCA (Snyk)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Application Dependencies
        run: |
          npm install --legacy-peer-deps

      - name: Run Snyk and Generate Report
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npx snyk test --severity-threshold=high --json-file-output=snyk-sca-report.json || true

      - name: Upload SCA Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: snyk-sca-report
          path: snyk-sca-report.json

  build_and_push:
    name: Build & Push Docker Image to AWS ECR
    needs: [sast_scan, sca_scan]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Docker Image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: juice-shop-devsecops
          IMAGE_TAG: latest
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

  deploy:
    name: Deploy Container to AWS EC2 Instance
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH Commands to Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. Install AWS CLI inside the server if it doesn't exist
            if ! command -v aws &> /dev/null; then
              sudo apt-get update && sudo apt-get install -y awscli
            fi
            
            # 2. Authenticate the server's Docker client with your AWS Registry
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 538311878117.dkr.ecr.ap-south-1.amazonaws.com
            
            # 3. Clean up any older running instance of the application container
            docker stop juice-shop-app || true
            docker rm juice-shop-app || true
            
            # 4. Pull down the fresh image and execute it live on Port 3000!
            docker pull 538311878117.dkr.ecr.ap-south-1.amazonaws.com/juice-shop-devsecops:latest
            docker run -d --name juice-shop-app -p 3000:3000 538311878117.dkr.ecr.ap-south-1.amazonaws.com/juice-shop-devsecops:latest
